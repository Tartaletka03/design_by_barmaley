<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="title" content="B@rmaley designs">
    <meta name="description" content="B@rmaley | Все работы в одном месте">
    <meta property="og:title" content="B@rmaley designs">
    <meta name="twitter:title" content="B@rmaley designs">
    <meta property="og:description" content="B@rmaley | Все работы в одном месте">
    <meta name="twitter:description" content="B@rmaley | Все работы в одном месте">
    <meta property="og:type" content="article">
    <meta property="og:url" content="https://tartaletka03.github.io/design_by_barmaley/">
    <meta property="og:locale" content="ru_RU">
    <link rel="image_src" href="https://tartaletka03.github.io/design_by_barmaley/hehe.png">
    <meta property="og:image" content="https://tartaletka03.github.io/design_by_barmaley/hehe.png">
    <meta property="vk:image" content="https://tartaletka03.github.io/design_by_barmaley/hehe.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://tartaletka03.github.io/design_by_barmaley/hehe.png">

    <meta name="p:domain_verify" content="1f68cb926b7ffa6d237b74ed7b793f2c"/>

    <title>B@rmaley designs</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="https://tartaletka03.github.io/design_by_barmaley/ico.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Мобильное боковое меню -->
    <div class="mobile-menu-toggle" id="mobileMenuToggle">
        <i class="fas fa-bars"></i>
    </div>

    <div class="mobile-sidebar" id="mobileSidebar">
        <div class="sidebar-header">
            <h3>Меню</h3>
            <button class="sidebar-close" id="sidebarClose">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="sidebar-content">
            <div class="mobile-theme-switcher">
                <p>Тема:</p>
                <label class="switch">
                    <input type="checkbox" id="mobileThemeToggle">
                    <span class="slider"></span>
                    <span class="theme-icons">
                        <span class="icon moon">🌙</span>
                        <span class="icon sun">☀️</span>
                    </span>
                </label>
            </div>
            <div class="mobile-contacts">
                <p>Контакты:</p>
                <div class="mobile-contact-links">
                    <a href="https://t.me/NoT_TFound" target="_blank" class="mobile-contact-link telegram" title="Telegram">
                        <i class="fab fa-telegram"></i>
                        <span>Telegram</span>
                    </a>
                    <a href="https://discordapp.com/users/860621809505402890" target="_blank" class="mobile-contact-link discord" title="Discord">
                        <i class="fab fa-discord"></i>
                        <span>Discord</span>
                    </a>
                    <a href="https://boosty.to/re_barmaley" target="_blank" class="mobile-contact-link boosty" title="Boosty">
                        <img src="https://tartaletka03.github.io/design_by_barmaley/boosty.svg" alt="Boosty" class="boosty-icon">
                        <span>Boosty</span>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <div class="hcontainer">
        <header class="header">
            <h1>by B@rmaley</h1>
            
            <!-- Десктопный переключатель темы -->
            <div class="theme-switcher desktop-theme">
                <label class="switch">
                    <input type="checkbox" id="desktopThemeToggle">
                    <span class="slider"></span>
                    <span class="theme-icons">
                        <span class="icon moon">🌙</span>
                        <span class="icon sun">☀️</span>
                    </span>
                </label>
            </div>
            
            <p>Хотите уникальный дизайн карточки? А может хотите что-то иное? <span id="mobileContactLink">Свяжитесь со мной!</span></p>
            
            <!-- Контакты в хедере (только для десктопа с текстом) -->
            <div class="desktop-contacts-wrapper">
                <a href="https://t.me/NoT_TFound" target="_blank" class="contact-link-with-text telegram" title="Telegram">
                    <i class="fab fa-telegram"></i>
                    <span>Telegram</span>
                </a>
                <a href="https://discordapp.com/users/860621809505402890" target="_blank" class="contact-link-with-text discord" title="Discord">
                    <i class="fab fa-discord"></i>
                    <span>Discord</span>
                </a>
                <a href="https://boosty.to/re_barmaley" target="_blank" class="contact-link-with-text boosty" title="Boosty">
                    <img src="https://tartaletka03.github.io/design_by_barmaley/boosty.svg" alt="Boosty" class="boosty-icon">
                    <span>Boosty</span>
                </a>
            </div>
        </header>
    </div>

    <div class="container">
        <div class="view-toggle-section">
            <button class="view-toggle-btn" id="showMoreBtn">📁 Показать больше карт</button>
        </div>

        <div class="controls-container" id="controlsContainer" style="display: none;">
            <div class="sort-controls">
                <button class="sort-btn" id="sortAsc">По возрастанию</button>
                <button class="sort-btn active" id="sortDesc">По убыванию</button>
            </div>

            <!-- <div class="filter-mode">
                <button class="mode-btn active" data-mode="or">ИЛИ (любой тег)</button>
                <button class="mode-btn" data-mode="and">И (все теги)</button>
                <button class="mode-btn" data-mode="except">КРОМЕ (исключить)</button>
            </div> -->

            <div class="filters-section" id="filtersSection">
                <div class="controls" id="filtersContainer">
                    <!-- Фильтры будут добавлены через JavaScript -->
                </div>
                <div class="filter-hint" id="filterHint">
                    <!-- Подсказка будет обновляться через JavaScript -->
                </div>
                <!-- Счетчик найденных карт - ПОД подсказкой фильтра -->
                <div class="found-cards-counter" id="foundCardsCounter">
                    <span class="counter-number" id="counterCurrent">0</span> из <span class="counter-number" id="counterTotal">0</span>
                </div>
            </div>

            <div class="view-toggle-section">
                <button class="view-toggle-btn secondary" id="showLessBtn">👁️ Показать меньше карт</button>
            </div>
        </div>

        <div class="cards-container" id="cardsContainer">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>Загрузка карточек...</p>
            </div>
        </div>

        <!-- Существующее модальное окно для увеличения карточки -->
        <div class="modal" id="imageModal">
            <div class="modal-content"></div>
        </div>

        <!-- НОВОЕ: модальное окно для подробной информации -->
        <div class="modal" id="detailsModal">
            <div class="details-modal-content">
                <div class="details-modal-header">
                    <h2>Подробнее о карточке</h2>
                    <div class="modal-close-btn details-close-btn">×</div>
                </div>
                <div class="details-body" id="detailsBody">
                    <!-- сюда будет загружаться содержимое -->
                </div>
                <div class="details-footer">
                    <button class="back-to-main-btn" id="backToMainBtn">← Вернуться на главную</button>
                </div>
            </div>
        </div>

        <footer class="footer">
            <p>© 2026 Коллекция карточек by B@rmaley | Да, у меня свой сайт хД</p>
        </footer>
    </div>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
